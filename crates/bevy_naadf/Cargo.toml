[package]
name = "bevy-naadf"
version = "0.1.0"
edition = "2021"
description = "Bevy 0.19 + Solari raytracing + DLSS Ray Reconstruction â€” foundation for the NAADF port"
license = "MIT"
# The crate ships three binaries (`bevy-naadf`, `e2e_render`, `bake`); `cargo run`
# / `just run` resolve to the production app unless another `--bin` is given.
default-run = "bevy-naadf"

# The crate is a library (`src/lib.rs` â€” the shared `build_app` app-wiring path)
# plus three thin binaries over it: `bevy-naadf` (the production app,
# `src/main.rs`), `e2e_render` (the bounded windowed render-test harness,
# `src/bin/e2e_render.rs`), and `bake` (the headless asset-processor runner,
# `src/bin/bake.rs` â€” see `src/texture_array/`). All the unit tests live in the
# library; `cargo test` runs them. See `docs/orchestrate/naadf-bevy-port/
# e2e-render-test.md` Â§9.
[lib]
name = "bevy_naadf"
path = "src/lib.rs"

[[bin]]
name = "bevy-naadf"
path = "src/main.rs"

[[bin]]
name = "e2e_render"
path = "src/bin/e2e_render.rs"

[[bin]]
name = "bake"
path = "src/bin/bake.rs"

[dependencies]
# free_camera = the prebuilt fly-camera from bevy_camera_controller (off by default).
# The `dlss` feature is forwarded from this crate's own `[features]` below;
# `basis-universal` (Bevy's runtime Basis transcoder) is added native-only in the
# `[target.'cfg(not(wasm32))']` section below â€” its C++ cannot cross-compile to
# the `wasm32-unknown-unknown` web target.
bevy = { version = "=0.19.0-rc.1", features = [
    "free_camera",
] }
# bytemuck = #[repr(C)] <-> &[u8] for the GPU-mirror structs (render/gpu_types.rs).
# Pinned to the version Bevy 0.19-rc.1 re-exports so the `Pod`/`Zeroable` traits
# match across the crate boundary.
bytemuck = { version = "=1.25.0", features = ["derive"] }
# dot_vox = MagicaVoxel `.vox` parser. Returns `DotVoxData { models, palette,
# materials, scenes, ... }` in the same shape NAADF's C# `MagicaVoxel.cs`
# parser produces; the port runs a flattening pass (`voxel/vox_import.rs`) to
# fold the scene graph into a `DenseVolume`. Used only by Track A `.vox`
# loading; pure-Rust nom parser, no native deps. See
# `docs/orchestrate/feature-completeness/02a-design-vox-loading.md`.
dot_vox = "5.2"
# image = PNG encoding for the e2e harness's persistent screenshot-to-disk
# (`src/e2e/framebuffer.rs` `Framebuffer::save_png`) plus PNG/JPEG *decoding* for
# the texture-array loader's source maps (`src/texture_array/loader.rs`). Pinned
# to the exact version Bevy 0.19-rc.1 already pulls in transitively (so there is
# no second copy of the crate).
image = { version = "=0.25.10", default-features = false, features = [
    "png",
    "jpeg",
] }
# image-compare = SSIM (Structural Similarity Index) implementation, consumed by
# the `--vox-gpu-oracle` gate (`src/e2e/vox_gpu_oracle.rs`, Stage 14 â€” see
# `docs/orchestrate/vox-gpu-rewrite/03-impl.md`). The gate compares two REAL
# framebuffer captures (CPU oracle vs production W5 GPU path); SSIM tolerates
# the renderer's inherent ~1.5-6% per-pixel TAA/GI shimmer + GPU atomic-cursor
# nondeterminism + the install-path world-shape divergence (natural-bound CPU
# vs fixed-tiled GPU) while still cratering on gross renderer regressions
# (sky-bleed, voxel-type corruption, palette OOB) that would drop SSIM far
# below 1.0. Pure-Rust dep, no native compile.
image-compare = "0.5"
# ron = the `*.texarray.ron` texture-array definition format
# (`src/texture_array/def.rs`). Bevy already pulls `ron` transitively at this
# minor version.
ron = "0.12"
# serde = derive `Deserialize` for the `*.texarray.ron` definition types
# (`src/texture_array/def.rs`). thiserror = the loader/saver error enums
# (`src/texture_array/{loader,saver}.rs`). Both are already in Bevy's tree at
# these majors, so neither adds a second copy.
serde = { version = "1", features = ["derive"] }
thiserror = "2"

# Native-only support for the texture-array Basis pipeline (`src/texture_array/`,
# `src/bin/bake.rs`):
#   * `bevy/asset_processor` â€” gates Bevy's `AssetProcessor` itself; without it
#     `AssetMode::Processed` only *reads* a pre-built `imported_assets/`, it
#     never runs the processor. The `bake` binary needs it; the production app
#     stays `Unprocessed` and just ignores the extra (unused) processor code.
#   * `bevy/basis-universal` â€” Bevy's runtime transcoder, so `ImageLoader` can
#     decode the baked `.basis` files and transcode them per-GPU at load.
#   * `basis-universal` â€” the encoder half, used by the processor's saver
#     (`src/texture_array/saver.rs`); version tracks the `0.3` Bevy 0.19 uses.
# Native-only on purpose: `basis-universal-sys` compiles the encoder C++
# unconditionally, and that does not cross-compile to bare
# `wasm32-unknown-unknown` (no C sysroot for `<stdlib.h>`). The web build
# therefore drops Basis entirely and loads `*.texarray.ron` uncompressed through
# `TextureArrayLoader` â€” see `src/texture_array/`. A single compressed artifact
# for both targets would need either a wasm C sysroot or a `bevy_voxel_world`
# style dual-format (BC7 + ETC2) pre-transcoding baker.
[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
bevy = { version = "=0.19.0-rc.1", features = [
    "asset_processor",
    "basis-universal",
] }
basis-universal = "0.3"

# wasm32-only: getrandom â‰Ą0.3 refuses to compile for `wasm32-unknown-unknown`
# without an explicit backend. `dot_vox`â†’`ahash` pulls getrandom 0.3.4
# transitively; we add it here as a direct dep purely to flip the `wasm_js`
# feature (which routes RNG through `crypto.getRandomValues`). Paired with
# `--cfg getrandom_backend="wasm_js"` in `.cargo/config.toml` â€” the upstream
# error message explicitly says the feature alone is insufficient, both are
# required. Native targets are unaffected: this entire dep block is gated
# behind `cfg(target_arch = "wasm32")`.
[target.'cfg(target_arch = "wasm32")'.dependencies]
getrandom = { version = "0.3", features = ["wasm_js"] }
# Web async `.vox` parse â€” `wasm-bindgen-rayon` spawns a worker pool of
# `navigator.hardwareConcurrency` Web Workers backed by `SharedArrayBuffer`
# (enabled by the COOP/COEP `same-origin` / `require-corp` headers in
# `_headers` + `e2e/serve.mjs`). `rayon::spawn` then schedules the
# multi-second `parse_vox_bytes` call onto a real worker thread instead of
# the wasm main thread â€” unblocks the renderer + the loading-overlay
# animation during the parse. The receiver lives in a Bevy Update system
# (`apply_pending_vox` in `voxel/web_vox.rs`) that reads from a
# `crossbeam_channel::Receiver<ImportedVox>` populated from the rayon
# worker. See `docs/orchestrate/web-vox-async-loading/03-architecture.md`
# Q1 for the full design.
#
# Build configuration is in `.cargo/config.toml`'s
# `[target.wasm32-unknown-unknown]` block (atomics + shared-memory rustflags
# + TLS link-args + `build-std`). The toolchain pin in `rust-toolchain.toml`
# guarantees `rust-src` for `build-std`.
wasm-bindgen-rayon = "1.3"
rayon = "1.11.0"
crossbeam-channel = "0.5"
# Web .vox loading â€” HTTP fetch + drag-and-drop. The web build streams the
# default model from R2 (`crates/bevy_naadf/src/voxel/web_vox.rs`) and accepts
# `.vox` files dropped onto the `<canvas>` element via a JS shim that calls
# back into wasm. `console_error_panic_hook` surfaces wasm panics to the JS
# console so the failures don't disappear into the void.
wasm-bindgen = "0.2"
wasm-bindgen-futures = "0.4"
js-sys = "0.3"
console_error_panic_hook = "0.1"
web-sys = { version = "0.3", features = [
    "Window",
    "Location",
    "Response",
    "Document",
    "Element",
    "HtmlElement",
    "HtmlCanvasElement",
    "EventTarget",
    "Event",
    "DragEvent",
    "DataTransfer",
    "File",
    "FileList",
    "Blob",
    "Node",
    "DomTokenList",
] }

[features]
default = []
# DLSS Ray Reconstruction. Forwards to Bevy's `dlss` feature, whose transitive
# `dlss_wgpu` build step needs the NVIDIA DLSS SDK + Vulkan + clang. Opt-in â€”
# the integration is not wired up yet, so leave off for normal builds.
dlss = ["bevy/dlss"]
# Mirrors Bevy's escape hatch so `cargo build --all-features` works without the
# SDK; it overrides `dlss` at the Bevy level.
force_disable_dlss = ["bevy/force_disable_dlss"]
# WebGPU (wasm32) build. Forwards to Bevy's `webgpu` feature, which selects the
# WebGPU wgpu backend over Bevy's default `webgl2` (when both are on, `webgpu`
# wins). Build with `--features webgpu` for the wasm32 target.
webgpu = ["bevy/webgpu"]

# The texture-array Basis pipeline needs no cargo feature: `AssetMode::Processed`
# lives entirely in the dedicated `bake` binary (`src/bin/bake.rs`), so the
# production app / e2e harness / wasm build are unaffected by it.

# NOTE: the `[profile.*]` fast-iteration tweaks live in the workspace-root
# `Cargo.toml` â€” Cargo only honours profile overrides in the root manifest.

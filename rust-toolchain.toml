[toolchain]
# Nightly pin for wasm32 atomics stability + `build-std` (required by
# `wasm-bindgen-rayon`'s `+atomics,+bulk-memory` rustflags + shared-memory
# linker args — see `.cargo/config.toml`'s `[target.wasm32-unknown-unknown]`
# block). Mirrors `/mnt/archive4/DEV/bevy_pixel_world/rust-toolchain.toml` —
# a floating nightly can break wasm-bindgen/rayon ABI overnight, so the date
# is pinned.
channel = "nightly"
components = ["rustfmt", "clippy", "rust-src"]
# wasm32-unknown-unknown — the bevy_naadf WebGPU build (Trunk).
# wasm32-unknown-emscripten — the voxel_noise FastNoise2 C-ABI module (Makefile).
targets = ["wasm32-unknown-unknown", "wasm32-unknown-emscripten"]

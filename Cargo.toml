[package]
name = "bevy-naadf"
version = "0.1.0"
edition = "2021"
description = "Bevy 0.19 + Solari raytracing + DLSS Ray Reconstruction — foundation for the NAADF port"
license = "MIT"

[dependencies]
# bevy_solari       = realtime raytraced lighting (experimental).
# bluenoise_texture = ships the blue-noise KTX2 Solari samples from.
# free_camera       = the prebuilt fly-camera from bevy_camera_controller (off by default).
# The `dlss` feature is forwarded from this crate's own `[features]` below.
bevy = { version = "=0.19.0-rc.1", features = [
    "bevy_solari",
    "bluenoise_texture",
    "free_camera",
] }

[features]
default = ["dlss"]
# DLSS Ray Reconstruction. Forwards to Bevy's `dlss` feature, whose transitive
# `dlss_wgpu` build step needs the DLSS SDK + Vulkan + clang (see .cargo/config.toml).
# Build with `--no-default-features` to compile without the SDK installed.
dlss = ["bevy/dlss"]
# Mirrors Bevy's escape hatch so `cargo build --all-features` works without the
# SDK; it overrides `dlss` at the Bevy level.
force_disable_dlss = ["bevy/force_disable_dlss"]

# Bevy's standard fast-iteration tweak: optimise dependencies even in dev builds.
[profile.dev.package."*"]
opt-level = 3

[profile.dev]
opt-level = 1

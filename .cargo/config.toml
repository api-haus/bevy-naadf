# Build-time environment (DLSS_SDK, VULKAN_SDK) is intentionally NOT set here —
# those are machine-specific paths and live in a gitignored `.envrc` instead
# (see `.envrc.example`). direnv exports them; otherwise source `.envrc` or
# export them yourself before invoking cargo.

# Faster linking with mold. Remove this section if you don't have clang + mold.
[target.x86_64-unknown-linux-gnu]
linker = "clang"
rustflags = ["-C", "link-arg=-fuse-ld=mold"]

# wasm32-unknown-unknown has no OS RNG, so getrandom ≥0.3 refuses to compile
# unless we explicitly pick a backend. `wasm_js` routes `getrandom_uninit`
# through the browser's `crypto.getRandomValues`, which is what Trunk's
# `just web` target needs. The cfg flag pairs with the matching `wasm_js`
# feature on the direct `getrandom` dep in `crates/bevy_naadf/Cargo.toml`
# (both are required — the feature alone is insufficient, per the upstream
# error message).
[target.wasm32-unknown-unknown]
rustflags = ['--cfg', 'getrandom_backend="wasm_js"']
